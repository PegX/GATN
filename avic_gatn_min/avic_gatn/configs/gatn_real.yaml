task:
  name: gatn_real
  gatn_repo_root: /Users/xupeng/Projects/information_security/GATN   # 真实 repo 路径
  checkpoint_path: /Users/xupeng/Projects/information_security/GATN/avic_gatn_min/checkpoints/model_best_96.3178.pth.tar
  
  # 以及 GATN 原 repo test 所需的参数（batch_size, num_classes, embedding, A1/A2 等）


device: cpu

alg1:
   topk: 20
   component_level: both
   lambda_score: 0.2

alg2:
  budget: 64
  steps: 2
  step_size: 32
  beam_size: 4
  max_edits_per_step: 4
  lam1: 0.5
  lam2: 0.5
  eps: 1e-6
  circuit_aware_lambda: 0.5
  circuit_aware_mode: attn_kl
  

gatn:
  repo_root: /Users/xupeng/Projects/information_security/GATN/
  dataset_root: /Users/xupeng/Projects/information_security/GATN/dataset
  phase: val
  batch_size: 16
  workers: 0
  adj_file: /Users/xupeng/Projects/information_security/GATN/model/topology/coco_correlation_adj.pkl

  # 关键：embedding 是 COCO2014(... inp_name=embedding) 用的 :contentReference[oaicite:4]{index=4}
  embedding: /Users/xupeng/Projects/information_security/GATN/model/embedding/coco_glove_word2vec_80x300_ec.pkl
  embedding_length: 300
  num_classes: 80
  t_hidden: 20
  image_size: 448 

  # 先给占位（因为 adapter 读取它，但真实 models.py 不用它）
  #adj_file: /Users/xupeng/Projects/information_security/GATN/model/topology/coco_correlation_adj.pkl

  t1: 0.2

  # 下面这些需要按你真实 repo 的模型构造参数填
  model_kwargs:
    num_classes: 80
    # ...

  data_kwargs:
    split: test
    root: /path/to/test_data_or_features

  num_workers: 0
  num_layers: 4
  num_heads: 4
  attn_names: ["attn1", "attn2"]   # 如果真实GATN只有一个，就写 ["attn"]: 3

data:
  steps_eval: 50 
